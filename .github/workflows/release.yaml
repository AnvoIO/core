name: Build Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: ubuntu24-x86_64
          - os: ubuntu-24.04-arm
            artifact: ubuntu24-arm64
    name: Package ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    container: ubuntu:noble
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev dpkg-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          chown -R $(id -u):$(id -g) $PWD
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm -GNinja
          cmake --build build
      - name: Package
        run: |
          cd build
          cpack -G DEB
          cpack -G TZST
          echo "=== Built packages ==="
          ls -la *.deb *.tar.zst 2>/dev/null || true
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.artifact }}
          path: |
            build/*.deb
            build/*.tar.zst

  create-release:
    name: Create Release
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: false
      - name: Collect packages
        run: |
          mkdir -p release
          find packages -name '*.deb' -o -name '*.tar.zst' | while read f; do
            cp "$f" release/
          done
          echo "=== Release artifacts ==="
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          prerelease: true
          generate_release_notes: true

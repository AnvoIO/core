name: "Build & Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
  workflow_dispatch:

permissions:
  packages: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-24.04-arm
    container: ubuntu:noble
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          chown -R $(id -u):$(id -g) $PWD
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm -GNinja
          cmake --build build
          find build/tests -type l -exec sh -c 'target=$(readlink "$1") && [ -f "$target" ] && rm "$1" && cp "$target" "$1"' _ {} \;
          tar -pc --exclude "*.o" build | zstd --long -T0 -9 > build.tar.zst
      - name: Upload builddir
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu24-arm64-build
          path: build.tar.zst
          compression-level: 0

  tests-arm64:
    name: Tests (ubuntu24-arm64)
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-arm64-build
      - name: Run Parallel Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          cd build
          ctest --output-on-failure -j $(( $(nproc) / 2 + 1 )) -LE "(nonparallelizable_tests|long_running_tests)" -E plugin_test --timeout 480
      - name: Run plugin_test (isolated)
        run: |
          cd build
          ctest --output-on-failure -R '^plugin_test$' --timeout 480

  np-tests-arm64:
    name: NP Tests (ubuntu24-arm64)
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-arm64-build
      - name: Run NP Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          cd build
          ctest --output-on-failure -j $(( $(nproc) / 2 + 1 )) -L nonparallelizable_tests --timeout 420

  lr-tests-arm64:
    name: LR Tests (ubuntu24-arm64)
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-arm64-build
      - name: Run LR Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          cd build
          ctest --output-on-failure -j $(( $(nproc) / 2 + 1 )) -L long_running_tests --timeout 2700

  all-passing:
    name: All Required Tests Passed
    needs: [tests-arm64, np-tests-arm64]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: needs.tests-arm64.result != 'success' || needs.np-tests-arm64.result != 'success'
        run: false

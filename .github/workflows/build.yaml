name: "Build & Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
  workflow_dispatch:

permissions:
  packages: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---- x86_64 Build ----
  build-x86:
    name: Build x86_64
    runs-on: ubuntu-24.04
    container: ubuntu:noble
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          chown -R $(id -u):$(id -g) $PWD
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm -GNinja
          cmake --build build
          # Replace symlinks with real files so the archive is self-contained
          find build/tests -type l -exec sh -c 'target=$(readlink "$1") && [ -f "$target" ] && rm "$1" && cp "$target" "$1"' _ {} \;
          tar -pc --exclude "*.o" build | zstd --long -T0 -9 > build.tar.zst
      - name: Upload builddir
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu24-x86-build
          path: build.tar.zst
          compression-level: 0

  # ---- ARM64 Build ----
  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-24.04-arm
    container: ubuntu:noble
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get upgrade -y && apt-get install -y \
            build-essential cmake git jq libcurl4-openssl-dev libgmp-dev \
            llvm-14-dev libzstd-dev ninja-build python3-numpy file zlib1g-dev zstd
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          chown -R $(id -u):$(id -g) $PWD
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm -GNinja
          cmake --build build
          # Replace symlinks in build/tests/ with real files so the archive
          # is self-contained for ephemeral containers
          find build/tests -type l -exec sh -c 'target=$(readlink "$1") && [ -f "$target" ] && rm "$1" && cp "$target" "$1"' _ {} \;
          tar -pc --exclude "*.o" build | zstd --long -T0 -9 > build.tar.zst
      - name: Upload builddir
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu24-arm64-build
          path: build.tar.zst
          compression-level: 0

  # ---- x86_64 Tests ----
  tests-x86:
    name: Tests x86_64
    needs: [build-x86]
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime deps
        run: |
          apt-get update && apt-get install -y \
            cmake libcurl4-openssl-dev libgmp-dev libssl-dev llvm-14-dev zstd python3 python3-numpy
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-x86-build
      - name: Run Parallel Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          # Patch CTest configs: replace build-time source dir with current workspace
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|WORKING_DIRECTORY \"[^\"]*\"|WORKING_DIRECTORY \"$PWD/build\"|g" {} +
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|CMAKE_SOURCE_DIR \"[^\"]*\"|CMAKE_SOURCE_DIR \"$PWD\"|g" {} +
          cd build
          ctest --output-on-failure -j $(nproc) -LE "nonparallelizable_tests|long_running_tests" --timeout 480

  np-tests-x86:
    name: NP Tests x86_64
    needs: [build-x86]
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime deps
        run: |
          apt-get update && apt-get install -y \
            cmake libcurl4-openssl-dev libgmp-dev libssl-dev llvm-14-dev zstd python3 python3-numpy
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-x86-build
      - name: Run Non-Parallelizable Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|WORKING_DIRECTORY \"[^\"]*\"|WORKING_DIRECTORY \"$PWD/build\"|g" {} +
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|CMAKE_SOURCE_DIR \"[^\"]*\"|CMAKE_SOURCE_DIR \"$PWD\"|g" {} +
          cd build
          ctest --output-on-failure -j 1 -L nonparallelizable_tests --timeout 420

  # ---- ARM64 Tests ----
  tests-arm64:
    name: Tests ARM64
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime deps
        run: |
          apt-get update && apt-get install -y \
            cmake libcurl4-openssl-dev libgmp-dev libssl-dev llvm-14-dev zstd python3 python3-numpy
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-arm64-build
      - name: Run Parallel Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|WORKING_DIRECTORY \"[^\"]*\"|WORKING_DIRECTORY \"$PWD/build\"|g" {} +
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|CMAKE_SOURCE_DIR \"[^\"]*\"|CMAKE_SOURCE_DIR \"$PWD\"|g" {} +
          cd build
          # ARM64 runners have 4 vCPUs — limit parallelism to avoid OOM
          ctest --output-on-failure -j 4 -LE "nonparallelizable_tests|long_running_tests" --timeout 480

  np-tests-arm64:
    name: NP Tests ARM64
    needs: [build-arm64]
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
      options: --security-opt seccomp=unconfined
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime deps
        run: |
          apt-get update && apt-get install -y \
            cmake libcurl4-openssl-dev libgmp-dev libssl-dev llvm-14-dev zstd python3 python3-numpy
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ubuntu24-arm64-build
      - name: Run Non-Parallelizable Tests
        run: |
          chown -R $(id -u):$(id -g) $PWD
          zstdcat build.tar.zst | tar x
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|WORKING_DIRECTORY \"[^\"]*\"|WORKING_DIRECTORY \"$PWD/build\"|g" {} +
          find build -name 'CTestTestfile.cmake' -exec sed -i "s|CMAKE_SOURCE_DIR \"[^\"]*\"|CMAKE_SOURCE_DIR \"$PWD\"|g" {} +
          cd build
          ctest --output-on-failure -j 1 -L nonparallelizable_tests --timeout 420

  # ---- Gate ----
  all-passing:
    name: All Required Tests Passed
    needs: [tests-x86, np-tests-x86, tests-arm64, np-tests-arm64]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: needs.tests-x86.result != 'success' || needs.np-tests-x86.result != 'success' || needs.tests-arm64.result != 'success' || needs.np-tests-arm64.result != 'success'
        run: false
